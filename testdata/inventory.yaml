    address: 192.168.1.10
    port: 22
    user: admin
    key_path: ~/.ssh/id_rsa
    tags:
      - web
      - prod

  - name: web-02
    address: 192.168.1.11
    port: 22
    user: admin
    key_path: ~/.ssh/id_rsa
    tags:
      - web
      - prod

  - name: db-01
    address: 192.168.1.20
    port: 2222
